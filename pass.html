<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NOVI Pass</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card pass-header">
      <p class="eyebrow">NOVI x OT Pop-up</p>
      <h1>NOVI PASS</h1>
      <p id="configStatus" class="status"></p>
      <p id="status" class="status">Loading pass...</p>
      <div id="passContent" class="hidden">
        <div id="qrBox" class="qr-box" aria-label="NOVI Pass QR"></div>
        <p id="qrFallback" class="status error hidden"></p>
        <dl>
          <div><dt>Display Name</dt><dd id="displayName"></dd></div>
          <div><dt>Participant Code</dt><dd id="participantCode"></dd></div>
          <div><dt>Event</dt><dd id="eventCode"></dd></div>
          <div><dt>Token</dt><dd id="tokenValue"></dd></div>
        </dl>
        <div class="stack">
          <button id="copyTokenBtn" type="button">Copy Token</button>
          <button id="copyCodeBtn" type="button">Copy Participant Code</button>
          <a id="resultLink" class="button-link secondary" href="#">Open Result Card</a>
        </div>
      </div>
    </section>
  </main>
  <script src="public-config.js"></script>
  <script src="public-config-loader.js"></script>
  <script src="supabase-rest-client.js"></script>
  <script src="browser-qr.js"></script>
  <script src="pass.js"></script>
</body>
</html>
